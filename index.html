<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BhashaLearn - Sinhala and English Vocabulary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4f8; --text: #0f172a; --muted: #64748b; --border: #cbd5e1;
      --glass: rgba(255, 255, 255, 0.6); --glass-strong: rgba(255, 255, 255, 0.9);
      --indigo: #4f46e5; --violet: #9333ea; --nav-h: 4.5rem;
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
    }
    html.dark {
      --bg: #020617; --text: #f1f5f9; --muted: #94a3b8; --border: #334155;
      --glass: rgba(30,41,59,.65); --glass-strong: rgba(15,23,42,.9);
      --shadow: 0 4px 30px rgba(0,0,0,.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, "Noto Sans Sinhala", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background .3s, color .3s;
    }
    .sinhala { font-family: "Noto Sans Sinhala", sans-serif; }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    img, svg { display: block; }
    .hidden { display: none !important; }
    .container { max-width: 72rem; margin: 0 auto; padding: 0 1rem; }
    .glass {
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 1rem; 
      box-shadow: var(--shadow), inset 0 2px 3px rgba(255, 255, 255, 0.7), inset 0 -2px 5px rgba(0, 0, 0, 0.03);
    }
    html.dark .glass { border-color: rgba(255,255,255,.08); }
    .glass-strong {
      background: var(--glass-strong); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .text-gradient {
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem; padding: .85rem 1.75rem;
      border-radius: .75rem; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35), inset 0 2px 3px rgba(255, 255, 255, 0.35), inset 0 -3px 4px rgba(0, 0, 0, 0.25);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-primary:hover { 
      transform: translateY(-3px) scale(1.02); 
      box-shadow: 0 12px 25px rgba(79, 70, 229, 0.45), inset 0 2px 3px rgba(255, 255, 255, 0.45), inset 0 -3px 4px rgba(0, 0, 0, 0.2); 
    }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: .5rem; padding: .85rem 1.75rem;
      border-radius: .75rem; font-weight: 600;
    }
    .btn-ghost.glass:hover { background: rgba(255,255,255,.8); }
    html.dark .btn-ghost.glass:hover { background: rgba(51,65,85,.8); }
    .icon-btn {
      padding: .5rem; border-radius: .5rem; color: var(--muted); transition: background .2s;
    }
    .icon-btn:hover { background: rgba(148,163,184,.15); }
    .badge {
      display: inline-flex; align-items: center; gap: .35rem; padding: .35rem .85rem;
      border-radius: 999px; font-size: .8rem; font-weight: 600;
      background: rgba(79,70,229,.1); color: var(--indigo); border: 1px solid rgba(79,70,229,.2);
    }
    html.dark .badge { color: #a5b4fc; }
    .progress { height: .5rem; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress > span {
      display: block; height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--indigo), var(--violet)); transition: width .4s ease;
    }
    .grid-3 { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .grid-2 { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: .8; } }
    .fade-up { animation: fadeUp .55s ease forwards; }
    #loader {
      position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: var(--bg); transition: opacity .4s;
    }
    #loader.out { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 52px; height: 52px; border: 3px solid var(--border);
      border-top-color: var(--indigo); border-radius: 50%; animation: spin .9s linear infinite;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: var(--nav-h);
    }
    nav .inner { display: flex; align-items: center; justify-content: space-between; height: var(--nav-h); }
    .logo { display: flex; align-items: center; gap: .5rem; font-weight: 700; font-size: 1.1rem; }
    .logo-mark {
      width: 2rem; height: 2rem; border-radius: .5rem; display: grid; place-items: center;
      background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; font-size: .85rem;
    }
    .nav-links { display: none; gap: .25rem; }
    @media (min-width: 768px) { .nav-links { display: flex; } .menu-btn { display: none !important; } }
    .nav-links a {
      display: flex; align-items: center; gap: .35rem; padding: .5rem .75rem;
      border-radius: .5rem; font-size: .875rem; font-weight: 500; color: var(--muted);
    }
    .nav-links a.active { background: rgba(79,70,229,.12); color: var(--indigo); }
    html.dark .nav-links a.active { color: #a5b4fc; }
    .nav-actions { display: flex; align-items: center; gap: .25rem; }
    #mobile-menu { border-top: 1px solid var(--border); padding: .75rem 1rem; }
    #mobile-menu a {
      display: flex; align-items: center; gap: .5rem; padding: .65rem .75rem;
      border-radius: .5rem; font-size: .9rem; color: var(--muted);
    }
    #mobile-menu a.active { background: rgba(79,70,229,.12); color: var(--indigo); }
    main { padding-top: var(--nav-h); min-height: calc(100vh - var(--nav-h)); }
    footer {
      border-top: 1px solid var(--border); padding: 2rem 1rem; margin-top: auto;
      text-align: center; color: var(--muted); font-size: .875rem;
    }
    .hero {
      position: relative; overflow: hidden; padding: 3rem 0 4rem;
      background-image:
        linear-gradient(to right, rgba(99,102,241,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(99,102,241,.06) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .hero-blob {
      position: absolute; border-radius: 50%; filter: blur(60px); opacity: .35; animation: pulse 6s ease infinite;
    }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.25rem); font-weight: 800; line-height: 1.15; margin-bottom: 1rem; }
    .hero p { color: var(--muted); font-size: 1.1rem; max-width: 40rem; margin: 0 auto 1.75rem; line-height: 1.6; }
    .hero-cta { display: flex; flex-wrap: wrap; gap: .75rem; justify-content: center; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; max-width: 28rem; margin: 3rem auto 0; }
    .stats .glass { padding: 1rem; text-align: center; }
    .stats strong { display: block; font-size: 1.5rem; color: var(--indigo); }
    .section-title { text-align: center; margin-bottom: 2.5rem; }
    .section-title h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
    .section-title p { color: var(--muted); }
    .cat-card {
      position: relative; overflow: hidden; min-height: 16rem;
      padding: 1.5rem; transition: all .4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; flex-direction: column; justify-content: flex-end;
      border-radius: 1.25rem; border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--glass);
    }
    .cat-card::before {
      content: ""; position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.4) 60%, transparent 100%);
      transition: opacity .3s;
    }
    .cat-card img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
      transition: transform .7s ease;
    }
    .cat-card > div { position: relative; z-index: 2; color: #fff; }
    .cat-card:hover { 
      transform: translateY(-8px) scale(1.02); 
      box-shadow: 0 25px 50px rgba(0,0,0,.3);
    }
    .cat-card:hover img { transform: scale(1.08); }
    .cat-icon {
      width: 3rem; height: 3rem; border-radius: .75rem; display: grid; place-items: center; margin-bottom: .75rem;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: transform .3s; border: 1px solid rgba(255,255,255,0.2);
    }
    .cat-card:hover .cat-icon { transform: scale(1.1) rotate(5deg); background: rgba(255,255,255,0.25); }
    .flash-wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1rem 3rem; }
    .flash-scene { perspective: 1200px; height: 20rem; margin-bottom: 1.5rem; }
    @media (min-width: 640px) { .flash-scene { height: 24rem; } }
    .flash-card {
      position: relative; width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(0.4, 0.2, 0.2, 1); cursor: pointer;
    }
    .flash-card:hover:not(.flipped) {
      transform: translateY(-4px) rotateX(2deg) rotateY(-2deg);
    }
    .flash-card.flipped { transform: rotateY(180deg); }
    .flash-face {
      position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 1.5rem; padding: 2rem; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      background: var(--glass-strong); border: 1px solid rgba(255,255,255,0.7); 
      box-shadow: var(--shadow), inset 0 4px 6px rgba(255,255,255,0.9), inset 0 -4px 6px rgba(0,0,0,0.05);
      transition: box-shadow .3s;
    }
    .flash-card:hover:not(.flipped) .flash-face:not(.back) {
      box-shadow: 0 25px 50px rgba(0,0,0,0.15), inset 0 4px 6px rgba(255,255,255,0.9), inset 0 -4px 6px rgba(0,0,0,0.05);
    }
    .flash-face.back { transform: rotateY(180deg); }
    .flash-face h2 { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 700; margin: .5rem 0; }
    .flash-face .en { font-size: 2rem; font-weight: 700; color: var(--indigo); }
    .flash-controls { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: .75rem; }
    .flash-controls .flip-btn { padding: .75rem 1.5rem; }
    .quiz-opt {
      width: 100%; padding: 1rem; border-radius: .75rem; font-weight: 600; text-align: center;
      border: 1px solid var(--border); transition: transform .15s, background .2s;
    }
    .quiz-opt:hover:not(:disabled) { transform: scale(1.02); }
    .quiz-opt.correct { background: rgba(16,185,129,.15); border-color: #10b981; color: #059669; }
    .quiz-opt.wrong { background: rgba(244,63,94,.15); border-color: #f43f5e; color: #e11d48; }
    .quiz-opt.dim { opacity: .45; }
    #search-modal {
      position: fixed; inset: 0; z-index: 60; display: flex; align-items: flex-start;
      justify-content: center; padding: 15vh 1rem 1rem;
    }
    #search-modal .backdrop { position: absolute; inset: 0; background: rgba(2,6,23,.65); backdrop-filter: blur(4px); }
    #search-modal .panel { position: relative; width: 100%; max-width: 32rem; border-radius: 1rem; overflow: hidden; }
    #search-modal input { flex: 1; outline: none; background: transparent; }
    .search-row {
      width: 100%; text-align: left; padding: .85rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-row:hover { background: rgba(148,163,184,.1); }
    .page-header { text-align: center; padding: 2rem 1rem 1rem; }
    .page-header h1 { font-size: clamp(1.75rem, 4vw, 2.25rem); font-weight: 700; margin: .5rem 0; }
    .page-header p { color: var(--muted); }
    select.glass, input.glass { padding: .5rem 1rem; border-radius: .5rem; width: 100%; outline: none; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    html.dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-ring"></div>
    <p style="color:var(--muted);font-weight:500;">Loading BhashaLearn…</p>
  </div>

  <nav class="glass-strong">
    <div class="container inner">
      <a href="#/" class="logo">
        <span class="logo-mark sinhala">බ</span>
        Basha<span style="color:var(--indigo)">Learn</span>
      </a>
      <div class="nav-links" id="nav-desktop"></div>
      <div class="nav-actions">
        <button class="icon-btn" id="btn-search" aria-label="Search" title="Search"></button>
        <button class="icon-btn" id="btn-theme" aria-label="Toggle theme"></button>
        <button class="icon-btn menu-btn" id="btn-menu" aria-label="Menu"></button>
      </div>
    </div>
    <div id="mobile-menu" class="glass-strong hidden"></div>
  </nav>

  <main id="app"></main>

  <footer>
    <div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;">
      <span class="logo" style="font-size:.95rem;"><span class="logo-mark sinhala" style="width:1.5rem;height:1.5rem;font-size:.7rem;">බ</span> BhashaLearn</span>
      <span>Made by Sameera</span>
      <span style="font-size:.75rem;">© <span id="year"></span> BhashaLearn</span>
    </div>
  </footer>

  <div id="search-modal" class="hidden">
    <div class="backdrop" id="search-close"></div>
    <div class="panel glass-strong">
      <div style="display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(--border);">
        <span id="search-icon"></span>
        <input type="text" id="search-input" placeholder="Search Sinhala or English words…" />
        <button class="icon-btn" id="search-x">✕</button>
      </div>
      <div id="search-results" style="max-height:50vh;overflow-y:auto;"></div>
    </div>
  </div>

  <script>
/* Vocabulary & categories — loaded into single-file build */
const CATEGORIES = [

  { id: "science", name: "Science", color: "#c084fc", icon: "science", image: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=600&auto=format&fit=crop" },
  { id: "technology", name: "Technology", color: "#34d399", icon: "cpu", image: "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=600&auto=format&fit=crop" },
  { id: "business", name: "Business", color: "#fbbf24", icon: "briefcase", image: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=600&auto=format&fit=crop" },
  { id: "school", name: "School Words", color: "#fb7185", icon: "school", image: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=600&auto=format&fit=crop" },
  { id: "advanced", name: "Advanced English", color: "#818cf8", icon: "book", image: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=600&auto=format&fit=crop" },

  { id: "food", name: "Food & Dining", color: "#f87171", icon: "coffee", image: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=600&auto=format&fit=crop" },
  { id: "health", name: "Health & Body", color: "#f472b6", icon: "activity", image: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=600&auto=format&fit=crop" },

const VOCABULARY = [
  { id: 1, sinhala: "හෙලෝ", english: "Hello", transliteration: "Helō", category: "daily", example: "Hello, how are you today?" },
  { id: 2, sinhala: "ස්තුතියි", english: "Thank you", transliteration: "Stutiyi", category: "daily", example: "Thank you for your help." },
  { id: 3, sinhala: "කණගාටුයි", english: "Sorry", transliteration: "Kanaṇgāṭuyi", category: "daily", example: "I am sorry for being late." },

  { id: 5, sinhala: "හෝටලය", english: "Hotel", transliteration: "Hōṭalaya", category: "daily", example: "We stayed at a luxury hotel." },

  { id: 8, sinhala: "වාහනය", english: "Vehicle", transliteration: "Vāhanaya", category: "daily", example: "My vehicle needs servicing." },
  { id: 9, sinhala: "කෑම", english: "Food", transliteration: "Kǣma", category: "daily", example: "Sri Lankan food is delicious." },
  { id: 10, sinhala: "වතුර", english: "Water", transliteration: "Vatura", category: "daily", example: "Please bring me a glass of water." },
  { id: 11, sinhala: "විද්‍යාව", english: "Science", transliteration: "Vidyāva", category: "science", example: "Science helps us understand nature." },

  { id: 17, sinhala: "පරමාණුව", english: "Atom", transliteration: "Paramāṇuva", category: "science", example: "An atom is made of protons and electrons." },

  { id: 21, sinhala: "පරිගණකය", english: "Computer", transliteration: "Parigaṇakaya", category: "technology", example: "I use a computer for my work." },
  { id: 22, sinhala: "අන්තර්ජාලය", english: "Internet", transliteration: "Antarjālaya", category: "technology", example: "The internet connects the world." },
  { id: 23, sinhala: "මෘදුකාංගය", english: "Software", transliteration: "Mr̥dukāṅgaya", category: "technology", example: "This software is free to use." },
  { id: 24, sinhala: "දෘඪාංගය", english: "Hardware", transliteration: "Dr̥ḍhāṅgaya", category: "technology", example: "The hardware needs an upgrade." },
  { id: 25, sinhala: "දත්ත", english: "Data", transliteration: "Datta", category: "technology", example: "Data security is very important." },
  { id: 26, sinhala: "මෙහෙයුම් පද්ධතිය", english: "Operating System", transliteration: "Meheyum paddhatiya", category: "technology", example: "Windows is an operating system." },

      const yesterday = new Date(Date.now() - 86400000).toDateString();

      <section class="container" style="padding:3rem 1rem;">
        <div class="section-title"><h2>Word of the Day</h2></div>
        <div class="glass fade-up" style="max-width:48rem;margin:0 auto;padding:0;display:flex;overflow:hidden;flex-wrap:wrap;border-radius:1.5rem;text-align:left;">
          <div style="flex:1; min-width:280px; padding:2rem 2.5rem; display:flex; flex-direction:column; justify-content:center;">
            <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
              <span class="badge">${catName(w.category)}</span>
              <button class="icon-btn" data-fav-daily="${w.id}" aria-label="Favorite">${isFav ? ICONS.heartFill : ICONS.heart}</button>
            </div>
            <h3 class="sinhala" style="font-size:2.5rem;font-weight:700;">${w.sinhala}</h3>
            <p style="color:var(--muted);font-style:italic;margin:.5rem 0 1.25rem;">${w.transliteration}</p>
            <div class="glass" style="padding:1.25rem;margin-bottom:1.5rem;">
              <p style="font-size:1.5rem;font-weight:600;color:var(--indigo);">${w.english}</p>
              <p style="font-size:.95rem;color:var(--muted);margin-top:.5rem;line-height:1.5;">"${w.example}"</p>
            </div>
            <div style="display:flex;gap:.5rem;">
              <button class="btn-ghost glass" data-speak="${w.sinhala}" data-lang="si-LK">${ICONS.vol} සිංහල</button>
              <button class="btn-ghost glass" data-speak="${w.english}" data-lang="en-US">${ICONS.vol} English</button>
            </div>
          </div>
          <div style="flex:1; min-width:250px; background:url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=800&auto=format&fit=crop') center/cover; min-height: 250px;"></div>
        </div>
      </section>
      <section class="container" style="padding:2rem 1rem 3rem;">
        <div class="section-title"><h2>Learning Categories</h2><p>Pick a topic to start studying.</p></div>
        <div class="grid-3">${renderCategoryCards()}</div>
      </section>`;
  }

  function renderCategoryCards() {
    return CATEGORIES.map(
      (c) => `
      <a href="${link("/flashcards")}?category=${c.id}" class="cat-card">
        <img src="${c.image}" alt="${c.name}" loading="lazy" />
        <div>
          <div class="cat-icon" style="color:${c.color};">${ICONS[c.icon] || ICONS.book}</div>
          <h3 style="font-weight:700;font-size:1.25rem;margin-bottom:.25rem;text-shadow:0 2px 4px rgba(0,0,0,0.5);">${c.name}</h3>
          <p style="font-size:.875rem;color:rgba(255,255,255,0.8);">Click to start learning</p>
        </div>
      </a>`
    ).join("");
  }

  function renderCategoriesPage() {
    return `
      <div class="page-header fade-up">
        <span class="badge">${ICONS.book} Browse Collections</span>
        <h1>Vocabulary Categories</h1>
        <p>Curated word lists for real-world situations.</p>
      </div>
      <div class="container grid-3" style="padding-bottom:3rem;">${renderCategoryCards()}</div>`;
  }

  function getFilteredWords(filter) {
    return filter === "all" ? VOCABULARY : VOCABULARY.filter((w) => w.category === filter);
  }

  function renderFlashcards() {
    const filter = state.flash.filter;
    const list = getFilteredWords(filter);
    const idx = Math.min(state.flash.index, Math.max(0, list.length - 1));
    const w = list[idx] || list[0];
    if (!w) return "<p>No words in this category.</p>";
    const favs = getFavorites();
    const learned = getLearned();
    const pctDeck = ((idx + 1) / list.length) * 100;
    const pctTotal = Math.round((learned.length / VOCABULARY.length) * 100);
    const flipped = state.flash.flipped ? "flipped" : "";

    return `
      <div class="page-header fade-up">
        <span class="badge">${ICONS.layers} Interactive Flashcards</span>
        <h1>Sinhala ↔ English Cards</h1>
        <p>Click or press Space to flip · Arrow keys to navigate</p>
      </div>
      <div class="flash-wrap fade-up">
        <div style="display:flex;justify-content:space-between;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;">
          <select class="glass" id="flash-filter">
            <option value="all"${filter === "all" ? " selected" : ""}>All Categories</option>
            ${CATEGORIES.map((c) => `<option value="${c.id}"${filter === c.id ? " selected" : ""}>${c.name}</option>`).join("")}
          </select>
          <button class="icon-btn glass" id="flash-random" title="Random" style="${state.flash.random ? "background:rgba(79,70,229,.15);color:var(--indigo);" : ""}">${ICONS.shuffle}</button>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.875rem;color:var(--muted);margin-bottom:.5rem;">
          <span>${idx + 1} / ${list.length}</span><span>${pctTotal}% total learned</span>
        </div>
        <div class="progress" style="margin-bottom:1.5rem;"><span style="width:${pctDeck}%"></span></div>
        <div class="flash-scene">
          <div class="flash-card ${flipped}" id="flash-card">
            <div class="flash-face">
              <span class="badge">${catName(w.category)}</span>
              <h2 class="sinhala">${w.sinhala}</h2>
              <p style="color:var(--muted);font-style:italic;">${w.transliteration}</p>
              <p style="font-size:.8rem;color:var(--muted);margin-top:1rem;">Click or Space to flip</p>
            </div>
            <div class="flash-face back">
              <p class="en">${w.english}</p>
              <p style="margin:1rem 0;color:var(--muted);max-width:20rem;">"${w.example}"</p>
              <div style="display:flex;gap:.5rem;">
                <button class="icon-btn glass" data-speak="${w.sinhala}" data-lang="si-LK">${ICONS.vol}</button>
                <button class="icon-btn glass" data-speak="${w.english}" data-lang="en-US">${ICONS.vol}</button>
              </div>
            </div>
          </div>
        </div>
        <div class="flash-controls">
          <button class="icon-btn glass" id="flash-prev">${ICONS.chevL}</button>
          <button class="icon-btn glass" data-fav-flash="${w.id}">${favs.includes(w.id) ? ICONS.heartFill : ICONS.heart}</button>
          <button class="icon-btn glass" data-learned="${w.id}" style="${learned.includes(w.id) ? "color:#10b981;" : ""}">${ICONS.check}</button>
          <button class="btn-primary flip-btn" id="flash-flip">${flipped ? "Show Front" : "Flip Card"}</button>
          <button class="icon-btn glass" id="flash-next">${ICONS.chevR}</button>
        </div>
        ${learned.includes(w.id) ? '<p style="text-align:center;margin-top:1rem;font-size:.875rem;color:#10b981;">✓ Marked as learned</p>' : ""}
      </div>`;
  }

  function renderQuiz() {
    const q = state.quiz;
    if (q.phase === "setup") {
      return `
        <div class="flash-wrap fade-up">
          <div class="glass" style="padding:2rem;text-align:center;max-width:28rem;margin:0 auto;">
            <div style="width:4rem;height:4rem;margin:0 auto 1rem;border-radius:1rem;background:linear-gradient(135deg,var(--indigo),var(--violet));display:grid;place-items:center;color:#fff;">${ICONS.trophy.replace('width="16"','width="32"')}</div>
            <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:.5rem;">Ready to Quiz?</h2>
            <p style="color:var(--muted);margin-bottom:1.5rem;">10 multiple-choice questions</p>
            <label style="display:block;text-align:left;font-size:.875rem;font-weight:500;margin-bottom:.5rem;">Category</label>
            <select class="glass" id="quiz-cat" style="margin-bottom:1.25rem;">
              <option value="all">All Categories (Mixed)</option>
              ${CATEGORIES.map((c) => `<option value="${c.id}">${c.name}</option>`).join("")}
            </select>
            <button class="btn-primary" id="quiz-start" style="width:100%;justify-content:center;">Start Quiz</button>
          </div>
        </div>`;
    }
    if (q.phase === "finished") {
      const last = q.questions[q.current];
      const bonus = q.selected === last?.correct ? 1 : 0;
      const final = q.score + bonus;
      const pct = Math.round((final / q.questions.length) * 100);
      const barColor = pct >= 70 ? "#10b981" : pct >= 40 ? "#f59e0b" : "#f43f5e";
      return `
        <div class="flash-wrap fade-up">
          <div class="glass" style="padding:2rem;text-align:center;max-width:28rem;margin:0 auto;">
            <h2 style="font-size:1.75rem;font-weight:700;">Quiz Complete!</h2>
            <p style="color:var(--muted);margin:1rem 0;">Score: ${final} / ${q.questions.length}</p>
            <div class="progress" style="height:1rem;margin-bottom:.5rem;"><span style="width:${pct}%;background:${barColor};"></span></div>
            <p style="font-weight:600;margin-bottom:1.5rem;">${pct}% accuracy</p>
            <button class="btn-primary" id="quiz-retry" style="width:100%;justify-content:center;margin-bottom:.5rem;">Try Again</button>
            <button class="btn-ghost glass" id="quiz-setup" style="width:100%;">Change Category</button>
          </div>
        </div>`;
    }

    const item = q.questions[q.current];
    const prog = (q.current / q.questions.length) * 100;
    return `
      <div class="flash-wrap fade-up">
        <div style="margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;font-size:.875rem;color:var(--muted);margin-bottom:.35rem;">
            <span>Question ${q.current + 1} of ${q.questions.length}</span>
            <span>${ICONS.trophy} Score: ${q.score}</span>
          </div>
          <div class="progress"><span style="width:${prog}%"></span></div>
        </div>
        <div class="glass" style="padding:2rem;">
          <div style="text-align:center;margin-bottom:1.5rem;">
            <span class="badge">${catName(item.category)}</span>
            <h3 class="sinhala" style="font-size:2.25rem;font-weight:700;margin:.75rem 0;">${item.sinhala}</h3>
            <button class="btn-ghost" data-speak="${item.sinhala}" data-lang="si-LK" style="font-size:.875rem;color:var(--muted);">${ICONS.vol} Listen</button>
          </div>
          <div class="grid-2" id="quiz-options">
            ${item.options.map((opt) => {
              let cls = "quiz-opt glass";
              if (q.answered) {
                if (opt === item.correct) cls += " correct";
                else if (opt === q.selected) cls += " wrong";
                else cls += " dim";
              }
              return `<button class="${cls}" data-opt="${opt.replace(/"/g, "&quot;")}" ${q.answered ? "disabled" : ""}>${opt}</button>`;
            }).join("")}
          </div>
        </div>
        ${q.answered ? `<div style="text-align:right;margin-top:1rem;"><button class="btn-primary" id="quiz-next">${q.current === q.questions.length - 1 ? "Finish Quiz" : "Next"} ${ICONS.arrow}</button></div>` : ""}
      </div>`;
  }

  function renderProgress() {
    const learned = getLearned();
    const favs = getFavorites();
    const history = getQuizHistory();
    const streak = updateStreak();
    const mastery = Math.round((learned.length / VOCABULARY.length) * 100);
    const recent = history.slice(0, 5);

    return `
      <div class="page-header fade-up">
        <span class="badge" style="background:rgba(16,185,129,.1);color:#059669;">${ICONS.trophy} Your Journey</span>
        <h1>Learning Progress</h1>
        <p>Streaks, quiz scores, and mastered words.</p>
      </div>
      <div class="container" style="padding-bottom:3rem;">
        <div class="grid-3" style="margin-bottom:1.5rem;">
          ${[
            ["Words Learned", learned.length, ICONS.book],
            ["Mastery", mastery + "%", ICONS.check],
            ["Quizzes", history.length, ICONS.trophy],
            ["Streak", streak + " days", ICONS.heart],
          ].map(([l, v, ic]) => `
            <div class="glass fade-up" style="padding:1.25rem;text-align:center;">
              <div style="margin-bottom:.5rem;color:var(--indigo);">${ic}</div>
              <strong style="font-size:1.5rem;display:block;">${v}</strong>
              <span style="font-size:.75rem;color:var(--muted);">${l}</span>
            </div>`).join("")}
        </div>
        <div class="glass" style="padding:1.5rem;margin-bottom:1.5rem;">
          <div style="display:flex;justify-content:space-between;margin-bottom:.75rem;">
            <strong>Overall Mastery</strong><span style="color:var(--indigo);font-weight:600;">${mastery}%</span>
          </div>
          <div class="progress" style="height:1rem;"><span style="width:${mastery}%"></span></div>
          <p style="font-size:.875rem;color:var(--muted);margin-top:.5rem;">${learned.length} of ${VOCABULARY.length} words learned</p>
        </div>
        <div class="grid-2">
          <div class="glass" style="padding:1.25rem;">
            <strong>Recent Quizzes</strong>
            ${recent.length ? recent.map((h) => {
              const p = Math.round((h.score / h.total) * 100);
              return `<div style="display:flex;justify-content:space-between;padding:.75rem;margin-top:.5rem;background:rgba(148,163,184,.08);border-radius:.5rem;">
                <span style="font-size:.875rem;">${new Date(h.date).toLocaleDateString()} · ${h.category === "all" ? "Mixed" : h.category}</span>
                <strong style="color:${p >= 70 ? "#10b981" : p >= 40 ? "#f59e0b" : "#f43f5e"}">${h.score}/${h.total}</strong>
              </div>`;
            }).join("") : '<p style="color:var(--muted);font-size:.875rem;margin-top:1rem;">No quizzes yet.</p>'}
          </div>
          <div class="glass" style="padding:1.25rem;">
            <strong>Favorites</strong>
            ${favs.length ? favs.slice(0, 8).map((id) => {
              const w = VOCABULARY.find((x) => x.id === id);
              return w ? `<div style="padding:.5rem 0;border-bottom:1px solid var(--border);"><span class="sinhala">${w.sinhala}</span> — ${w.english}</div>` : "";
            }).join("") : '<p style="color:var(--muted);font-size:.875rem;margin-top:1rem;">No favorites yet.</p>'}
          </div>
        </div>
      </div>`;
  }

  function renderFavorites() {
    const favs = getFavorites();
    const words = VOCABULARY.filter((w) => favs.includes(w.id));
    return `
      <div class="container" style="padding:2rem 1rem 3rem;">
        <h1 style="font-size:2rem;font-weight:700;margin-bottom:1.5rem;">Your Favorites</h1>
        ${words.length ? `<div class="grid-2">${words.map((w) => `
          <div class="glass" style="padding:1.25rem;">
            <div style="display:flex;justify-content:space-between;">
              <span class="badge">${w.category}</span>
              <button data-remove-fav="${w.id}" class="icon-btn" style="color:#f43f5e;">${ICONS.heartFill}</button>
            </div>
            <h3 class="sinhala" style="font-size:1.75rem;font-weight:700;">${w.sinhala}</h3>
            <p style="color:var(--indigo);font-weight:600;">${w.english}</p>
            <p style="font-size:.875rem;color:var(--muted);margin:.75rem 0;font-style:italic;">"${w.example}"</p>
            <button data-speak="${w.sinhala}" data-lang="si-LK" class="icon-btn">${ICONS.vol}</button>
          </div>`).join("")}</div>` : `
          <div class="glass" style="padding:3rem;text-align:center;">
            <p style="font-size:3rem;margin-bottom:1rem;">♡</p>
            <p style="color:var(--muted);margin-bottom:1rem;">Heart words while studying to save them here.</p>
            <a href="${link("/flashcards")}" class="btn-primary">Start Studying</a>
          </div>`}
      </div>`;
  }

  function render() {
    renderNav();
    if (state.path === "/flashcards") {
      if (state.params.category) state.flash.filter = state.params.category;
      if (state.params.word) {
        const list = getFilteredWords(state.flash.filter);
        const i = list.findIndex((w) => w.id === parseInt(state.params.word, 10));
        if (i >= 0) state.flash.index = i;
      }
      app.innerHTML = renderFlashcards();
    } else if (state.path === "/quiz") app.innerHTML = renderQuiz();
    else if (state.path === "/categories") app.innerHTML = renderCategoriesPage();
    else if (state.path === "/favorites") app.innerHTML = renderFavorites();
    else if (state.path === "/progress") app.innerHTML = renderProgress();
    else app.innerHTML = renderHome();

    bindPageEvents();
    document.querySelectorAll(".nav-links a, #mobile-menu a").forEach((a) => {
      a.classList.toggle("active", a.getAttribute("href") === link(state.path));
    });
  }

  function startQuiz() {
    const cat = $("#quiz-cat")?.value || state.quiz.category;
    const pool = cat === "all" ? VOCABULARY : VOCABULARY.filter((w) => w.category === cat);
    const picked = [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(10, pool.length));
    state.quiz = {
      phase: "active",
      category: cat,
      questions: picked.map((word) => {
        const others = pool.filter((w) => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3).map((w) => w.english);
        const options = [word.english, ...others].sort(() => Math.random() - 0.5);
        return { ...word, options, correct: word.english };
      }),
      current: 0,
      score: 0,
      selected: null,
      answered: false,
    };
    render();
  }

  function finishQuiz() {
    const q = state.quiz;
    const item = q.questions[q.current];
    const final = q.score + (q.selected === item.correct ? 1 : 0);
    const hist = getQuizHistory();
    hist.unshift({ date: new Date().toISOString(), score: final, total: q.questions.length, category: q.category });
    save("quizHistory", hist.slice(0, 50));
    q.phase = "finished";
    render();
  }

  function bindPageEvents() {
    document.querySelectorAll("[data-speak]").forEach((btn) => {
      btn.onclick = (e) => {
        e.stopPropagation();
        speak(btn.dataset.speak, btn.dataset.lang);
      };
    });

    $("#flash-filter")?.addEventListener("change", (e) => {
      state.flash.filter = e.target.value;
      state.flash.index = 0;
      state.flash.flipped = false;
      render();
    });
    $("#flash-random")?.addEventListener("click", () => {
      state.flash.random = !state.flash.random;
      render();
    });
    const flip = () => { state.flash.flipped = !state.flash.flipped; render(); };
    $("#flash-card")?.addEventListener("click", flip);
    $("#flash-flip")?.addEventListener("click", (e) => { e.stopPropagation(); flip(); });
    $("#flash-prev")?.addEventListener("click", () => navFlash(-1));
    $("#flash-next")?.addEventListener("click", () => navFlash(1));

    document.querySelector("[data-fav-daily]")?.addEventListener("click", function () {
      const id = +this.dataset.favDaily;
      setFavorites((f) => (f.includes(id) ? f.filter((x) => x !== id) : [...f, id]));
      render();
    });
    document.querySelector("[data-fav-flash]")?.addEventListener("click", function () {
      const id = +this.dataset.favFlash;
      setFavorites((f) => (f.includes(id) ? f.filter((x) => x !== id) : [...f, id]));
      render();
    });
    document.querySelector("[data-learned]")?.addEventListener("click", function () {
      const id = +this.dataset.learned;
      setLearned((l) => (l.includes(id) ? l.filter((x) => x !== id) : [...l, id]));
      render();
    });

    $("#quiz-start")?.addEventListener("click", startQuiz);
    $("#quiz-retry")?.addEventListener("click", startQuiz);
    $("#quiz-setup")?.addEventListener("click", () => { state.quiz.phase = "setup"; render(); });

    document.querySelectorAll("[data-opt]").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (state.quiz.answered) return;
        state.quiz.selected = btn.dataset.opt;
        state.quiz.answered = true;
        if (btn.dataset.opt === state.quiz.questions[state.quiz.current].correct) state.quiz.score++;
        render();
      });
    });
    $("#quiz-next")?.addEventListener("click", () => {
      if (state.quiz.current < state.quiz.questions.length - 1) {
        state.quiz.current++;
        state.quiz.selected = null;
        state.quiz.answered = false;
        render();
      } else finishQuiz();
    });

    document.querySelectorAll("[data-remove-fav]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = +btn.dataset.removeFav;
        setFavorites((f) => f.filter((x) => x !== id));
        render();
      });
    });
  }

  function navFlash(dir) {
    const list = getFilteredWords(state.flash.filter);
    state.flash.flipped = false;
    if (state.flash.random) {
      state.flash.index = Math.floor(Math.random() * list.length);
    } else {
      state.flash.index = (state.flash.index + dir + list.length) % list.length;
    }
    render();
  }

  function initTheme() {
    const stored = localStorage.getItem("theme");
    const dark = stored ? stored === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.classList.toggle("dark", dark);
    $("#btn-theme").innerHTML = dark ? ICONS.sun : ICONS.moon;
  }

  function toggleTheme() {
    const dark = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", dark);
    localStorage.setItem("theme", dark ? "dark" : "light");
    $("#btn-theme").innerHTML = dark ? ICONS.sun : ICONS.moon;
  }

  function openSearch() {
    $("#search-modal").classList.remove("hidden");
    $("#search-input").value = "";
    $("#search-results").innerHTML = "";
    $("#search-input").focus();
  }
  function closeSearch() {
    $("#search-modal").classList.add("hidden");
  }
  function onSearchInput(q) {
    const el = $("#search-results");
    if (!q.trim()) { el.innerHTML = ""; return; }
    const ql = q.toLowerCase();
    const hits = VOCABULARY.filter(
      (w) => w.sinhala.includes(q) || w.english.toLowerCase().includes(ql) || w.transliteration.toLowerCase().includes(ql)
    ).slice(0, 8);
    if (!hits.length) {
      el.innerHTML = `<p style="padding:2rem;text-align:center;color:var(--muted);">No matches for "${q}"</p>`;
      return;
    }
    el.innerHTML = hits.map((w) => `
      <button class="search-row" data-goto="${w.id}">
        <span><strong class="sinhala">${w.sinhala}</strong><br><small style="color:var(--muted);">${w.english} · ${w.transliteration}</small></span>
        ${ICONS.arrow}
      </button>`).join("");
    el.querySelectorAll("[data-goto]").forEach((b) => {
      b.onclick = () => {
        location.hash = `/flashcards?word=${b.dataset.goto}`;
        closeSearch();
      };
    });
  }

  window.addEventListener("hashchange", () => { parseRoute(); render(); });
  window.addEventListener("keydown", (e) => {
    if (state.path !== "/flashcards") return;
    if (e.code === "Space") { e.preventDefault(); state.flash.flipped = !state.flash.flipped; render(); }
    if (e.code === "ArrowRight") navFlash(1);
    if (e.code === "ArrowLeft") navFlash(-1);
  });

  $("#btn-theme").addEventListener("click", toggleTheme);
  $("#btn-search").innerHTML = ICONS.search;
  $("#search-icon").innerHTML = ICONS.search;
  $("#btn-search").addEventListener("click", openSearch);
  $("#search-close").addEventListener("click", closeSearch);
  $("#search-x").addEventListener("click", closeSearch);
  $("#search-input").addEventListener("input", (e) => onSearchInput(e.target.value));
  $("#btn-menu").innerHTML = ICONS.menu;
  $("#btn-menu").addEventListener("click", () => $("#mobile-menu").classList.toggle("hidden"));
  $("#year").textContent = new Date().getFullYear();

  initTheme();
  parseRoute();
  updateStreak();
  render();

  setTimeout(() => {
    $("#loader").classList.add("out");
    setTimeout(() => $("#loader").remove(), 500);
  }, 700);
})();

</script>
</body>
</html>
